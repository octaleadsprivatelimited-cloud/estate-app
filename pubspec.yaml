name: estatekart
description: EstateKart - Flipkart-inspired Real Estate Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.3.0

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2
  lottie: ^3.1.2
  fl_chart: ^0.68.0

  # Maps
  google_maps_flutter: ^2.9.0

  # Video
  video_player: ^2.9.1
  chewie: ^1.8.1

  # Networking & Storage
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Utilities
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  intl: ^0.20.2
  uuid: ^4.5.1
  timeago: ^3.7.0
  flutter_rating_bar: ^4.0.1
  phone_number: ^2.1.0

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  material_design_icons_flutter: ^7.0.7296

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
